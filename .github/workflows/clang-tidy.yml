name: Static Analysis

on:
  push:
    branches:
    - 'main'
    paths-ignore:
      - 'docs/**'
  pull_request:
    branches:
      - '**'
    paths-ignore:
      - 'docs/**'

permissions:
  contents: read

jobs:
  clang_tidy:
    name: Clang-Tidy
    runs-on: [runs-on, runner=16cpu-linux-x64, "run-id=${{ github.run_id }}", "extras=s3-cache"]
    container:
      image: ghcr.io/px4/px4-dev:v1.17.0-rc2
    permissions:
      contents: read
      pull-requests: read
    steps:
    - uses: runs-on/action@v2
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        fetch-tags: true
    - name: Configure Git Safe Directory
      run: git config --system --add safe.directory '*'

    - uses: ./.github/actions/setup-ccache
      id: ccache
      with:
        cache-key-prefix: ccache-clang-tidy
        max-size: 150M

    - name: Build - px4_sitl_default (Clang)
      run: make -j16 px4_sitl_default-clang

    - name: Run Clang-Tidy Analysis
      id: clang_tidy
      run: |
        if [ "${{ github.event_name }}" != "pull_request" ]; then
          make -j$(nproc) clang-tidy
        else
          python3 Tools/ci/run-clang-tidy-pr.py origin/${{ github.base_ref }}
        fi

    # The clang-tidy-diff artifact producer uses a SEPARATE build
    # directory configured with -DCMAKE_TESTING=ON so that test files
    # (gated by BUILD_TESTING) land in compile_commands.json with
    # proper include paths. Without this, clang-tidy-diff running on a
    # PR diff that touches a test file fails with
    # "gtest/gtest.h file not found".
    #
    # We keep a separate build dir (not the main one above) because
    # the main `make clang-tidy` push-to-main job runs
    # `run-clang-tidy.py` across ALL TUs, and 189 pre-existing issues
    # in PX4's test files would break main. The diff-based artifact
    # producer is inherently scoped to lines the PR changed, so
    # pre-existing test file issues never surface.
    #
    # fuzztest pulls in abseil via FetchContent, and abseil runs a
    # try_compile with fuzztest's -fsanitize=address flags. The
    # px4-dev container ships clang but not the clang compiler-rt
    # runtime, so that link fails and the configure reports
    # "pthreads not found". libclang-rt-18-dev provides
    # libclang_rt.asan and friends so the configure passes.
    - name: Configure test-enabled build for PR review artifact
      if: always() && github.event_name == 'pull_request'
      run: |
        apt-get update
        apt-get install -y --no-install-recommends libclang-rt-18-dev
        make px4_sitl_default-clang-test

    # On PRs, also produce a `pr-review` artifact for the PR Review Poster
    # workflow to consume. clang-tidy-diff-18 emits a unified fixes.yml that
    # the producer script translates into line-anchored review comments.
    # Running this inside the same container as the build means there is no
    # workspace-path rewriting and no cross-runner artifact handoff.
    - name: Export clang-tidy fixes for PR review
      if: always() && github.event_name == 'pull_request'
      run: |
        mkdir -p pr-review
        # Drop changed C/C++ source files that are not in
        # compile_commands.json for the test-enabled build. Files not
        # in the DB are platform-specific sources, vendored code, or
        # submodule code we don't own. Feeding them to clang-tidy-diff
        # produces false positives from unresolved headers.
        python3 Tools/ci/clang-tidy-diff-filter.py \
          --build-dir build/px4_sitl_default-clang-test \
          --base-ref origin/${{ github.base_ref }} \
          --out pr-review/diff.patch
        if [ -s pr-review/diff.patch ]; then
          clang-tidy-diff-18.py -p1 \
            -path build/px4_sitl_default-clang-test \
            -export-fixes pr-review/fixes.yml \
            -j0 < pr-review/diff.patch || true
        else
          echo "No analyzable files in diff; skipping clang-tidy-diff"
        fi

    - name: Build pr-review artifact
      if: always() && github.event_name == 'pull_request'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        python3 Tools/ci/clang-tidy-fixes-to-review.py \
          --fixes pr-review/fixes.yml \
          --repo-root "$GITHUB_WORKSPACE" \
          --repo "$GITHUB_REPOSITORY" \
          --pr-number "${{ github.event.pull_request.number }}" \
          --commit-sha "${{ github.event.pull_request.head.sha }}" \
          --out-dir pr-review \
          --event COMMENT

    - name: Upload pr-review artifact
      if: always() && github.event_name == 'pull_request'
      uses: actions/upload-artifact@v7
      with:
        name: pr-review
        path: |
          pr-review/manifest.json
          pr-review/comments.json
        retention-days: 1

    - uses: ./.github/actions/save-ccache
      if: always()
      with:
        cache-primary-key: ${{ steps.ccache.outputs.cache-primary-key }}
